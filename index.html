<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MLBB Draft Counter</title>
  <meta name="description" content="Enemy picks and bans to role-based hero recommendations." />
  <meta name="theme-color" content="#070A13" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <meta name="referrer" content="no-referrer" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="loading-overlay" id="loadingOverlay">
    <div class="load-icon">ML</div>
    <div class="load-text">Loading data...</div>
  </div>
  <div class="error-box" id="errorBox">
    <div class="error-inner">
      <div class="error-title">Loading Error</div>
      <div class="error-msg" id="errorMsg"></div>
    </div>
  </div>

  <div class="app" id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">ML</div>
        <div>
          <div class="brand-name">MLBB Draft Counter</div>
        </div>
      </div>
      <div class="topbar-right">
        <div class="search-wrap">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="M21 21l-4.35-4.35"></path>
          </svg>
          <input id="search" placeholder="Search hero..." autocomplete="off" aria-label="Search hero" />
          <button class="search-clear" id="searchClear" type="button" aria-label="Clear search">×</button>
        </div>
        <button class="btn-demo" id="demoBtn" type="button">Demo</button>
        <button class="btn-clear" id="clearBtn" type="button">Reset</button>
        <div class="status-pill" id="statusPill">—</div>
      </div>
    </header>

    <div class="main">
      <section class="pool-panel">
        <div class="pool-header">
          <div class="pool-title-row">
            <div>
              <div class="pool-title">Hero Pool</div>
            </div>
            <div class="pool-count" id="poolCount">—</div>
          </div>
          <div class="role-bar">
            <button class="role-chip active" data-role="All" type="button"><span class="role-dot rd-All"></span>All</button>
            <button class="role-chip" data-role="Roam" type="button"><span class="role-dot rd-Roam"></span>Roam</button>
            <button class="role-chip" data-role="Jungle" type="button"><span class="role-dot rd-Jungle"></span>Jungle</button>
            <button class="role-chip" data-role="Mid" type="button"><span class="role-dot rd-Mid"></span>Mid</button>
            <button class="role-chip" data-role="Gold" type="button"><span class="role-dot rd-Gold"></span>Gold</button>
            <button class="role-chip" data-role="Exp" type="button"><span class="role-dot rd-Exp"></span>Exp</button>
            <button class="mine-toggle" id="mineToggle" type="button" aria-pressed="false">
              My Heroes
              <span class="toggle-track"></span>
            </button>
          </div>
        </div>
        <div class="pool-scroll">
          <div class="hero-grid" id="heroGrid"></div>
        </div>
      </section>

      <aside class="draft-panel">
        <div class="draft-scroll">
          <div class="allies-section" id="alliesSection">
            <button class="allies-header" id="alliesHeader" type="button" aria-expanded="false">
              <span class="section-label">
                <span class="allies-title">Allies</span>
                <span class="section-count" id="allyCount">0/4</span>
              </span>
              <span class="allies-chevron">▾</span>
            </button>
            <div class="allies-body">
              <div class="draft-row" id="allyRow"></div>
            </div>
          </div>

          <div class="bans-section" id="bansSection">
            <button class="bans-header" id="bansHeader" type="button" aria-expanded="false">
              <span class="section-label">
                <span class="bans-title">Bans</span>
                <span class="section-count" id="banCount">0/10</span>
              </span>
              <span class="bans-chevron">▾</span>
            </button>
            <div class="bans-body">
              <div class="draft-row" id="banRow"></div>
            </div>
          </div>

          <div class="picks-section" id="picksSection">
            <button class="picks-header" id="picksHeader" type="button" aria-expanded="false">
              <span class="section-label">
                <span class="picks-title">Enemy Picks</span>
                <span class="section-count" id="pickCount">0/5</span>
              </span>
              <span class="picks-chevron">▾</span>
            </button>
            <div class="picks-body">
              <div class="draft-row" id="pickRow"></div>
            </div>
          </div>

          <div style="flex:1">
            <div class="section-head">
              <span class="section-title">Recommendations</span>
            </div>
            <div class="recs-tabs" id="recsTabs"></div>
            <div id="recsContent"></div>
            <div class="score-legend">
              <div class="leg-dot" style="background:var(--green)"></div><span>Counter</span>
              <div class="leg-dot" style="background:#4801d5;margin-left:10px"></div><span>Synergy</span>
              <div class="leg-dot" style="background:var(--red);margin-left:10px"></div><span>Weaker</span>
            </div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
